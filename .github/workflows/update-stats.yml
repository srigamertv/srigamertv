name: Update GitHub Stats Cards

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Criar pasta assets
        run: mkdir -p assets

      - name: Baixar cards (temporários)
        run: |
          set -e

          STATS_URL="https://github-readme-stats.vercel.app/api?username=srigamertv&show_icons=true&include_all_commits=true&theme=dark&hide_border=true&locale=pt-br&rank_icon=github&custom_title=Estat%C3%ADsticas%20do%20GitHub"
          LANGS_URL="https://github-readme-stats.vercel.app/api/top-langs/?username=srigamertv&layout=compact&langs_count=8&theme=dark&hide_border=true&locale=pt-br&card_width=360"

          curl --fail --location --retry 5 --retry-delay 3 --retry-all-errors "$STATS_URL" -o assets/github-stats.tmp.svg
          curl --fail --location --retry 5 --retry-delay 3 --retry-all-errors "$LANGS_URL" -o assets/top-langs.tmp.svg

      - name: Validar SVGs
        run: |
          set -e

          grep -qi "<svg" assets/github-stats.tmp.svg
          grep -qi "<svg" assets/top-langs.tmp.svg

          # (opcional) evita salvar resposta de erro disfarçada
          ! grep -qi "bad gateway" assets/github-stats.tmp.svg
          ! grep -qi "bad gateway" assets/top-langs.tmp.svg
          ! grep -qi "error" assets/github-stats.tmp.svg || true
          ! grep -qi "error" assets/top-langs.tmp.svg || true

      - name: Substituir arquivos finais
        run: |
          mv -f assets/github-stats.tmp.svg assets/github-stats.svg
          mv -f assets/top-langs.tmp.svg assets/top-langs.svg

      - name: Commitar alterações (se houver)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/github-stats.svg assets/top-langs.svg

          if git diff --staged --quiet; then
            echo "Sem alterações para commit."
          else
            git commit -m "chore: atualizar cards de estatísticas"
            git push
          fi
